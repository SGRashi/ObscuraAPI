version: '3.8'

services:
 
  postgres-db:
    image: postgres:15-alpine
    container_name: obscura_postgres
    environment:
      POSTGRES_USER: vault_admin
      POSTGRES_PASSWORD: super_secret_password_123
      POSTGRES_DB: obscura_vault
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

 
  minio-storage:
    image: minio/minio:latest
    container_name: obscura_minio
    ports:
      - "9000:9000"      
      - "9001:9001"     
    environment:
      MINIO_ROOT_USER: minio_admin
      MINIO_ROOT_PASSWORD: minio_storage_password_123
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

volumes:
  postgres_data:
  minio_data:
